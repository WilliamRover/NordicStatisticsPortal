<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Font awesome -->
    <script src="https://kit.fontawesome.com/ce255f3d20.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <!-- MDB -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.1/mdb.min.css" rel="stylesheet"/>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="../icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Nordic Statistics Portal</title>
    <!-- <link rel="preload" href="./homepage.css" as="style">
    <link rel="preload" href="./homepage.js" as="script"> -->
    <link rel="stylesheet" href="./homepage.css">
</head>
<body class="iosevka-charon-regular">
    <!-- Navbar -->
    <section id="navbar"></section>
    <section id="main">
        <section class="intro">
            <img src="./img/banner.png" alt="">
            <span idLan="homepage.intro.welcome" class="iosevka-charon-bold"></span>
        </section>
        <section class="midpage">
            <span idLan="homepage.midpage.select" class="iosevka-charon-bold select"></span>
            <div class="buttons">
                <div class="chart btn" style="cursor: pointer;" onclick="window.location='..\\Chart\\'">
                    <div class="icon"></div>
                    <br>
                    <span idLan="homepage.midpage.chart"></span>
                </div>
                <div class="map btn" style="cursor: pointer;" onclick="window.location='..\\Map\\'">
                    <div class="icon"></div>
                    <br>
                    <span idLan="homepage.midpage.map"></span>
                </div>
            </div>
        </section>
    </section>
    <!-- Footer -->
    <section id="footer"></section>
    <script src="./homepage.js" async defer type="module"></script>
    <script src="../lang.js" async defer type="module"></script>
</body>
</html>
